<!DOCTYPE html>
<html>
  <head>
<meta charset="UTF-8">
<title>Retro Ping Pong</title>

<link rel="stylesheet" href="index.css">

</head>
  <body>
    <div class="rpp-game-container">
  <h1 class="rpp-title">Retro Ping Pong</h1>
  <div class="rpp-scoreboard">
    <div class="rpp-score">
      <span class="rpp-score-label">Player 1</span>
      <span id="rppPlayer1Score" class="rpp-score-value">0</span>
    </div>
    <div class="rpp-score">
      <span class="rpp-score-label">Player 2 (AI)</span>
      <span id="rppPlayer2Score" class="rpp-score-value">0</span>
    </div>
  </div>
  <canvas id="rppGameCanvas"></canvas>
  <button id="rppStartButton" class="rpp-button">Start Game</button>
  <p id="rppInstructions" class="rpp-instructions">Use W (Up) and S (Down) keys to move your paddle.</p>
  <p id="rppWinMessage" class="rpp-win-message" style="display:none;"></p>
</div>
    <script src="index.js"></script>
  </body>
</html>
